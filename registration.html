<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Smart DT Guide</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-logo">DT</div>
            <h2>Join the Sprint</h2>
            <p class="subtitle">Create your CAMP21 workspace</p>
            <form action="dashboard.html" method="GET">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" class="form-control" placeholder="e.g. Ahmad bin Ali" required>
                </div>
                <div class="form-group">
                    <label>Team Name</label>
                    <input type="text" class="form-control" placeholder="e.g. Team Innovatex">
                </div>
                <div class="form-group">
                    <label>Student Email</label>
                    <input type="email" class="form-control" placeholder="name@polipd.edu.my" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-submit">Create Account</button>
            </form>
            <div class="auth-footer">Already registered? <a href="login.html">Log In</a></div>
        </div>
    </div>
</body>
</html>
