<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Login | Smart DT Guide</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;font-family:Inter,system-ui,sans-serif;background:radial-gradient(circle at 20% 20%,rgba(107,77,255,.35),transparent 30%),linear-gradient(135deg,#050816,#0B1022,#170725);color:#F8FAFF;display:grid;place-items:center;padding:18px}.card{width:min(430px,100%);padding:34px;border-radius:30px;background:rgba(12,18,34,.82);border:1px solid rgba(255,255,255,.14);box-shadow:0 30px 80px rgba(0,0,0,.5);text-align:center}.logo{max-width:230px;height:auto;margin-bottom:28px}.mark{display:inline-grid;place-items:center;width:48px;height:48px;border-radius:16px;background:linear-gradient(135deg,#3D63FF,#FF4FCB);font-weight:900;margin-bottom:20px}h1{font-size:36px;letter-spacing:-.06em;margin-bottom:8px}.sub{color:#AEB7D0;margin-bottom:24px}.field{text-align:left;margin-bottom:14px}.field label{display:block;color:#C8D0ED;font-weight:800;font-size:12px;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}.field input{width:100%;height:54px;border-radius:17px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.055);color:white;padding:0 16px;font:600 14px Inter;outline:none}.field input:focus{border-color:#21D4C2;box-shadow:0 0 0 4px rgba(33,212,194,.10)}.btn{height:58px;border-radius:18px;background:linear-gradient(105deg,#0AA8FF,#6B4DFF,#B822FF);display:flex;align-items:center;justify-content:center;color:white;text-decoration:none;font-weight:900;margin-top:20px;border:0;width:100%;font-size:16px}.footer{margin-top:22px;color:#AEB7D0}.footer a{color:#21D4C2;text-decoration:none;font-weight:900}.back{position:fixed;left:24px;top:22px;color:#CBD3EF;text-decoration:none;font-weight:800}</style></head>
<body><a class="back" href="index.html">← Welcome</a><main class="card"><img class="logo" src="assets/brand/logo-full.png" alt="Smart DT Guide" onerror="this.style.display='none';this.nextElementSibling.style.display='inline-grid';"><span class="mark" style="display:none">DT</span><h1>Welcome Back</h1><p class="sub">Continue your CAMP21 Design Thinking journey.</p><form action="dashboard.html" method="GET"><div class="field"><label>Email</label><input type="email" required placeholder="name@example.com"></div><div class="field"><label>Password</label><input type="password" required placeholder="••••••••"></div><button class="btn" type="submit">Log In →</button></form><div class="footer">New here? <a href="registration.html">Create Account</a></div></main></body></html>
