<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | Smart DT Guide</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="auth-logo">DT</div>
            <h2>Welcome Back</h2>
            <p class="subtitle">Continue your CAMP21 journey</p>
            <form action="dashboard.html" method="GET">
                <div class="form-group">
                    <label>Student Email</label>
                    <input type="email" class="form-control" placeholder="name@polipd.edu.my" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-submit">Log In</button>
            </form>
            <div class="auth-footer">New to CAMP21? <a href="registration.html">Create Account</a></div>
        </div>
    </div>
</body>
</html>
